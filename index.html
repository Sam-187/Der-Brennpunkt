<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Der Brennpunkt</title>
    <style>
        .editable {
            background-color: yellow;
            border: 2px dashed black;
        }
        #adminPanel {
            display: none;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1 class="editable" id="title">Welcome to Der Brennpunkt</h1>
    <p class="editable" id="description">This is a burning point for discussions.</p>

    <div id="adminPanel">
        <h2>Admin Panel</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password" />
        <button id="loginBtn">Login</button>
        <button id="logoutBtn" style="display:none;">Logout</button>
        <br/>
        <label><input type="checkbox" id="editModeToggle"> Edit Mode</label>
        <button id="saveBtn" style="display:none;">Save</button>
    </div>

    <script>
        const title = document.getElementById('title');
        const description = document.getElementById('description');
        const adminPanel = document.getElementById('adminPanel');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const editModeToggle = document.getElementById('editModeToggle');
        const saveBtn = document.getElementById('saveBtn');

        const ADMIN_PASSWORD = 'admin_password'; // Set your admin password here

        // Load content from localStorage
        title.textContent = localStorage.getItem('title') || title.textContent;
        description.textContent = localStorage.getItem('description') || description.textContent;

        // Login functionality
        loginBtn.addEventListener('click', () => {
            const password = adminPassword.value;
            if (password === ADMIN_PASSWORD) {
                adminPanel.style.display = 'block';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline';
            } else {
                alert('Incorrect password!');
            }
        });

        // Logout functionality
        logoutBtn.addEventListener('click', () => {
            adminPanel.style.display = 'none';
            logoutBtn.style.display = 'none';
            loginBtn.style.display = 'inline';
        });

        // Toggle edit mode
        editModeToggle.addEventListener('change', () => {
            if (editModeToggle.checked) {
                title.contentEditable = true;
                description.contentEditable = true;
                title.classList.add('editable');
                description.classList.add('editable');
                saveBtn.style.display = 'inline';
            } else {
                title.contentEditable = false;
                description.contentEditable = false;
                title.classList.remove('editable');
                description.classList.remove('editable');
                saveBtn.style.display = 'none';
            }
        });

        // Save changes to localStorage
        saveBtn.addEventListener('click', () => {
            localStorage.setItem('title', title.textContent);
            localStorage.setItem('description', description.textContent);
            alert('Changes saved!');
        });
    </script>
</body>
</html>
